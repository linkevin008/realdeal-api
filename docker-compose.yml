services:
  postgres:
    image: postgres:16-alpine
    container_name: realdeal-db
    environment:
      POSTGRES_USER: realdeal
      POSTGRES_PASSWORD: realdeal_dev
      POSTGRES_DB: realdeal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realdeal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
